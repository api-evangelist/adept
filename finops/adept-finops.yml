publisherName: Adept
serviceCategory: AI and Machine Learning
billingModel:
  pricingCategory: Other
  billingFrequency: One-Time
  billingCurrency: USD
  chargeCategories:
  - Adjustment
focusColumns:
  ServiceName: Adept Open-Source Models
