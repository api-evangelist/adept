meters:
- name: model_downloads
  description: Adept open-source model downloads (free) used for cost-free attribution / inventory tracking only.
  unit: downloads
  aggregation: sum
  dimensions:
  - team
  - model
- name: self_hosted_inference_cost
  description: Customer's own GPU inference cost when serving Adept open-source models (recorded under the inference provider, not Adept).
  unit: usd
  aggregation: sum
  dimensions:
  - team
  - model
  - inference_provider
principles:
- name: Visibility
  description: Inventory which teams downloaded Adept models; correlate with self-hosted GPU spend tagged to those models.
- name: Allocation
  description: Tag GPU inference workloads with the model name (Fuyu-8B / Persimmon-8B) for chargeback.
- name: Optimization
  description: Quantize or distill Adept open-source models if hosting cost exceeds value; consider replacing with newer open-source action models.
- name: Accountability
  description: No Adept invoice to reconcile; owners are the teams running self-hosted inference.
maintainers:
