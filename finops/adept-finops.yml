description: >-
  FinOps view of Adept "spend." Adept does not invoice customers - it has
  no commercial API. The only direct cost surface is downloading the open-
  source Fuyu-8B and Persimmon-8B models from Hugging Face (free) and the
  customer's own self-hosted GPU inference cost (or third-party inference
  provider cost). Those costs appear under the inference provider's
  ServiceName, not Adept's.
notes: >-
  In a corporate FOCUS dataset there is typically no Adept-issued invoice
  line item. Track the Adept models via tagging on the inference provider's
  spend (e.g., AWS / Together / Fireworks running Fuyu-8B).
sources:
- https://www.adept.ai/
